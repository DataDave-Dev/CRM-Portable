<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 150">

  <defs>
    <!-- Gradiente azul moderno -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>

  <!-- Icono -->
  <g transform="translate(70,75)">
    
    <circle r="36" fill="#1976D2"/>
    <circle r="14" fill="white"/>

    <circle cx="0" cy="-52" r="7" fill="#1976D2"/>
    <circle cx="52" cy="0" r="7" fill="#1976D2"/>
    <circle cx="0" cy="52" r="7" fill="#1976D2"/>
    <circle cx="-52" cy="0" r="7" fill="#1976D2"/>

    <line x1="0" y1="-36" x2="0" y2="-45" stroke="#1976D2" stroke-width="5"/>
    <line x1="36" y1="0" x2="45" y2="0" stroke="#1976D2" stroke-width="5"/>
    <line x1="0" y1="36" x2="0" y2="45" stroke="#1976D2" stroke-width="5"/>
    <line x1="-36" y1="0" x2="-45" y2="0" stroke="#1976D2" stroke-width="5"/>

  </g>

  <!-- Texto principal -->
  <text x="150" y="85"
        font-family="Segoe UI, Inter, Arial, sans-serif"
        font-size="48"
        font-weight="700"
        fill="url(#textGradient)"
        letter-spacing="1">
        CRM System
  </text>

  <!-- Subtexto -->
  <text x="152" y="110"
        font-family="Segoe UI, Inter, Arial, sans-serif"
        font-size="16"
        fill="#6B7280"
        letter-spacing="2">
        AUTOMATION PLATFORM
  </text>

</svg>